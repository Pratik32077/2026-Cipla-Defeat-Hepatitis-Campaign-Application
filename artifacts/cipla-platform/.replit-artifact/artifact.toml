kind = "web"
previewPath = "/"
title = "CIPLA Defeat Hepatitis Platform"
version = "1.0.0"
id = "artifacts/cipla-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24127

[services.development]
run = "pnpm --filter @workspace/cipla-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cipla-platform", "run", "build" ]
publicDir = "artifacts/cipla-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24127"
BASE_PATH = "/"
